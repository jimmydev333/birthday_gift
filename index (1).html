<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Yashmaya</title>
<style>
body{
margin:0;
font-family:Arial;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ff9a9e,#fad0c4);
overflow:hidden;
}
.card{
text-align:center;
color:white;
z-index:2;
animation:fadeIn 2s ease-in-out;
}
h1{font-size:42px;}
p{font-size:18px;}

.balloon{
position:absolute;
bottom:-100px;
width:40px;
height:50px;
border-radius:50%;
animation:up 7s infinite ease-in;
}
.balloon:nth-child(1){left:10%;background:red;}
.balloon:nth-child(2){left:30%;background:blue;animation-delay:1s;}
.balloon:nth-child(3){left:50%;background:yellow;animation-delay:2s;}
.balloon:nth-child(4){left:70%;background:green;animation-delay:3s;}

.confetti{
position:absolute;
width:8px;
height:8px;
background:white;
animation:fall 5s linear infinite;
}

@keyframes up{
0%{transform:translateY(0);opacity:1;}
100%{transform:translateY(-120vh);opacity:0;}
}

@keyframes fall{
0%{transform:translateY(-10vh) rotate(0deg);}
100%{transform:translateY(110vh) rotate(360deg);}
}

@keyframes fadeIn{
from{opacity:0;transform:scale(0.7);}
to{opacity:1;transform:scale(1);}
}
</style>
</head>
<body>

<div class="balloon"></div>
<div class="balloon"></div>
<div class="balloon"></div>
<div class="balloon"></div>

<script>
for(let i=0;i<50;i++){
let d=document.createElement('div');
d.className='confetti';
d.style.left=Math.random()*100+'vw';
d.style.animationDuration=(Math.random()*3+3)+'s';
document.body.appendChild(d);
}
</script>

<div class="card">
<h1>🎉 Happy Birthday Yashmaya ❤️ 🎉</h1>
<p>May your day be filled with love, happiness & endless smiles 💖</p>
</div>

</body>
</html>
